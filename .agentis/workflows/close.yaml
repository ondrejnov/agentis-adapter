version: 1
workflow:
  image: rg.nl-ams.scw.cloud/reactis/opencode:1.3
  imagePullSecrets:
    - name: registry
  workingDir: "[%MAIN_DIR%]"
  timeoutSeconds: 600
  ttlSecondsAfterFinished: 3600
  envFiles:
    - /root/.config/agentis/agentis.env
  env:
    HOME: /root
    BRANCH: "[%BRANCH%]"
    BASE_BRANCH: "[%BASE_BRANCH%]"
    MAIN_DIR: "[%MAIN_DIR%]"
  volumeMounts:
    - name: www
      mountPath: /var/www
    - name: agentis-tmp
      mountPath: /tmp/agentis
    - name: gitconfig
      mountPath: /root/.gitconfig
      readOnly: true
    - name: agentis-config
      mountPath: /root/.config/agentis
      readOnly: true
  steps:
    - name: Remove worktree and task branch
      run: |
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        if [ -d "$WORKDIR" ]; then
          git worktree remove --force "$WORKDIR" || { rm -rf "$WORKDIR" && git worktree prune; }
        fi
        git worktree prune
        if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
          git branch -D "$BRANCH"
        fi
        printf 'Prostředí a git větev byly uklizeny.\n' > "$AGENTIS_RUN_DIR/outputs/final-comment.md"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: 6
volumes:
  - name: www
    hostPath:
      path: /var/www
  - name: agentis-tmp
    hostPath:
      path: /tmp/agentis
      type: DirectoryOrCreate
  - name: gitconfig
    hostPath:
      path: /root/.gitconfig
      type: FileOrCreate
  - name: agentis-config
    hostPath:
      path: /root/.config/agentis/
