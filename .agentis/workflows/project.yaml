version: 1
extends: _base
workflow:
  env:
    TASK_NUMBER: "[%TASK_NUMBER%]"
    TASK_TITLE: "[%TASK_TITLE%]"
    AGENT_BROWSER_SCREENSHOT_DIR: "[%RUN_DIR%]/.screenshots"
    IS_SANDBOX: 1
    CLARP_DEBUG_PTY: 1
    CLARP_DEBUG: 1
    CLARP_DEBUG_API: 1
    PYTHONPATH: "[%WORKDIR%]/backend"
    PATH: "[%WORKDIR%]/.venv/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  volumeMounts:
    - name: npm-cache
      mountPath: /root/.npm
    - name: poetry-cache
      mountPath: /root/.cache/pypoetry
    - name: claudecodejson
      mountPath: /root/.claude.json
    - name: claudecode
      mountPath: /root/.claude
  steps:
    - name: Run agent
      run: |
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        MODEL="${AGENTIS_MODEL:-openai/gpt-5.4-mini}"
        case "$(printf '%s' "$MODEL" | tr '[:upper:]' '[:lower:]')" in
          *claude*) ADAPTER=claude ;;
          *) ADAPTER=opencode ;;
        esac
        agentiscode --json --adapter "$ADAPTER" \
          ${AGENTIS_SESSION_ID:+--resume "$AGENTIS_SESSION_ID"} \
          --model "$MODEL" \
          --run-id "$AGENTIS_RUN_ID" \
          --task-id "$AGENTIS_TASK_ID" \
          --final-output "$AGENTIS_RUN_DIR/outputs/final-comment.md" \
          --session-output "$AGENTIS_RUN_DIR/outputs/session-id" \
          < "$AGENTIS_PROMPT_FILE"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: 5
        - type: session_id
          valueFrom: outputs/session-id
volumes:
  - name: npm-cache
    hostPath:
      path: /root/.npm
      type: DirectoryOrCreate
  - name: poetry-cache
    hostPath:
      path: /root/.cache/pypoetry
      type: DirectoryOrCreate
  - name: claudecode
    hostPath:
      path: /root/.claude
      type: DirectoryOrCreate
  - name: claudecodejson
    hostPath:
      path: /root/.claude.json
