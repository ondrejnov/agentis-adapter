version: 1
workflow:
  image: rg.nl-ams.scw.cloud/reactis/opencode:1.3
  imagePullSecrets:
    - name: registry
  workingDir: "[%WORKDIR%]"
  timeoutSeconds: 14400
  ttlSecondsAfterFinished: 300
  envFiles:
    - /root/.config/agentis/agentis.env
  env:
    HOME: /root
    TASK_NUMBER: "[%TASK_NUMBER%]"
    TASK_TITLE: "[%TASK_TITLE%]"
    MAIN_DIR: "[%MAIN_DIR%]"
    AGENT_BROWSER_SCREENSHOT_DIR: "[%RUN_DIR%]/.screenshots"
    IS_SANDBOX: 1
    CLARP_DEBUG_PTY: 1
    CLARP_DEBUG: 1
    CLARP_DEBUG_API: 1
    PYTHONPATH: "[%WORKDIR%]/backend"
    PATH: "[%WORKDIR%]/.venv/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  volumeMounts:
    - name: www
      mountPath: /var/www
    - name: agentis-tmp
      mountPath: /tmp/agentis
    - name: npm-cache
      mountPath: /root/.npm
    - name: poetry-cache
      mountPath: /root/.cache/pypoetry
    - name: agentis-config
      mountPath: /root/.config/agentis
      readOnly: true
    - name: opencode-config
      mountPath: /root/.config/opencode
    - name: opencode-share
      mountPath: /root/.local/share/opencode
    - name: claudecodejson
      mountPath: /root/.claude.json
    - name: claudecode
      mountPath: /root/.claude
  steps:
    - name: Run agent
      run: |
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        MODEL="${AGENTIS_MODEL:-openai/gpt-5.4-mini}"
        case "$(printf '%s' "$MODEL" | tr '[:upper:]' '[:lower:]')" in
          *claude*) ADAPTER=claude ;;
          *) ADAPTER=opencode ;;
        esac
        agentiscode --json --adapter "$ADAPTER" \
          ${AGENTIS_SESSION_ID:+--resume "$AGENTIS_SESSION_ID"} \
          --model "$MODEL" \
          --run-id "$AGENTIS_RUN_ID" \
          --task-id "$AGENTIS_TASK_ID" \
          --final-output "$AGENTIS_RUN_DIR/outputs/final-comment.md" \
          --session-output "$AGENTIS_RUN_DIR/outputs/session-id" \
          < "$AGENTIS_PROMPT_FILE"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: 5
        - type: session_id
          valueFrom: outputs/session-id
volumes:
  - name: www
    hostPath:
      path: /var/www
  - name: agentis-tmp
    hostPath:
      path: /tmp/agentis
      type: DirectoryOrCreate
  - name: npm-cache
    hostPath:
      path: /root/.npm
      type: DirectoryOrCreate
  - name: poetry-cache
    hostPath:
      path: /root/.cache/pypoetry
      type: DirectoryOrCreate
  - name: agentis-config
    hostPath:
      path: /root/.config/agentis/
  - name: opencode-config
    hostPath:
      path: /root/.config/opencode
      type: DirectoryOrCreate
  - name: opencode-share
    hostPath:
      path: /root/.local/share/opencode
      type: DirectoryOrCreate
  - name: claudecode
    hostPath:
      path: /root/.claude
      type: DirectoryOrCreate
  - name: claudecodejson
    hostPath:
      path: /root/.claude.json
