version: 1
extends: _base
workflow:
  # Followup akce nabídnuté v completion komentáři; každá dispatchne `start`
  # s pojmenovaným workflow `.agentis/workflows/<workflow>.yaml`.
  followups:
    - title: Git merge
      if: PR_CREATED
      prompt: Sloučit změny z task větve do hlavní větve.
      workflow: merge
    - title: Zavřít prostředí
      prompt: Uklidit prostředí, worktree a task větev.
      workflow: close
  env:
    TASK_NUMBER: "[%TASK_NUMBER%]"
    TASK_TITLE: "[%TASK_TITLE%]"
    GITHUB_REPO: "[%GITHUB_REPO%]"
    AGENT_BROWSER_SCREENSHOT_DIR: "[%WORKDIR%]/.screenshots"
    IS_SANDBOX: 1
    PYTHONPATH: "[%WORKDIR%]/backend"
    PATH: "[%WORKDIR%]/.venv/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  volumeMounts:
    - name: npm-cache
      mountPath: /root/.npm
    - name: poetry-cache
      mountPath: /root/.cache/pypoetry
    - name: claudecodejson
      mountPath: /root/.claude.json
    - name: claudecode
      mountPath: /root/.claude
  steps:
    - name: Copy environment file
      run: |
        if [ -f "$MAIN_DIR/.env" ]; then
          cp "$MAIN_DIR/.env" .env
        fi
    - name: Check environment
      run: |
        mkdir -p .agentis/outputs
        if [ -n "${AGENTIS_SESSION_ID:-}" ] && [ -x .venv/bin/python ]; then
          printf 'true' > .agentis/outputs/env-ready
        else
          printf 'false' > .agentis/outputs/env-ready
        fi
      outputs:
        - type: var
          name: ENV_READY
          valueFrom: .agentis/outputs/env-ready
    - name: Create virtualenv
      if: ENV_READY != 'true'
      run: python3.13 -m venv .venv
    - name: Lock dependencies
      if: ENV_READY != 'true'
      run: poetry lock --no-update --no-interaction --no-ansi
    - name: Install dependencies
      if: ENV_READY != 'true'
      run: poetry install --no-interaction --no-ansi
    - name: Build code-review graph
      if: ENV_READY != 'true'
      run: code-review-graph build
    - name: Run agent
      uses: run-agent
      env:
        RUN_AGENT_FLAGS: ""
        RUN_AGENT_OUTPUT_DIR: .agentis/outputs
      outputs:
        - type: agent_comment
          bodyFrom: .agentis/outputs/final-comment.md
          status: 4
        - type: session_id
          valueFrom: .agentis/outputs/session-id
    - name: Commit changes
      run: |
        git add -A
        if git diff --cached --quiet; then
          echo "Žádné změny ke commitnutí."
        else
          git -c user.name=Agentis -c user.email=code@agentis.cz \
            commit -m "TASK: #${TASK_NUMBER} - ${TASK_TITLE}"
        fi
      outputs:
        - label: Commit
          type: text
          valueFrom: .agentis/label-code-tasks-state.json

    - name: Create pull request
      if: GITHUB_REPO
      run: |
        mkdir -p .agentis/outputs
        rm -f .agentis/outputs/pull-request-url
        git fetch origin "$BASE_BRANCH"
        if [ "$(git rev-list --count FETCH_HEAD..HEAD)" -eq 0 ]; then
          echo "Žádné commity oproti ${BASE_BRANCH}, pull request se přeskakuje."
          exit 0
        fi
        git push --set-upstream origin "${BRANCH}:refs/heads/${BRANCH}"
        if gh pr view "$BRANCH" --json url --jq .url >.agentis/outputs/pull-request-url 2>/dev/null; then
          echo "Pull request už existuje: $(cat .agentis/outputs/pull-request-url)"
        else
          gh pr create --base "$BASE_BRANCH" --head "$BRANCH" \
            --title "${TASK_TITLE:-$BRANCH}" \
            --body "${TASK_TITLE:-$BRANCH}" \
            >.agentis/outputs/pull-request-url
        fi
        if [ -s .agentis/outputs/pull-request-url ]; then
          pr_url="$(cat .agentis/outputs/pull-request-url)"
          printf '%s/changes\n' "${pr_url%/}" >.agentis/outputs/pull-request-url
        fi
      outputs:
        - label: Pull Request
          type: url
          valueFrom: .agentis/outputs/pull-request-url
        - type: var
          name: PR_CREATED
          valueFrom: .agentis/outputs/pull-request-url
volumes:
  - name: npm-cache
    hostPath:
      path: /root/.npm
      type: DirectoryOrCreate
  - name: poetry-cache
    hostPath:
      path: /root/.cache/pypoetry
      type: DirectoryOrCreate
  - name: gitnexus
    hostPath:
      path: /root/.gitnexus
      type: DirectoryOrCreate
  - name: claudecode
    hostPath:
      path: /root/.claude
      type: DirectoryOrCreate
  - name: claudecodejson
    hostPath:
      path: /root/.claude.json
  - name: hf-cache
    hostPath:
      path: /root/.cache/huggingface
      type: DirectoryOrCreate
