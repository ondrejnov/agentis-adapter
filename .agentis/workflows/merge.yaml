version: 1
workflow:
  image: rg.nl-ams.scw.cloud/reactis/opencode:1.3
  imagePullSecrets:
    - name: registry
  workingDir: "[%WORKDIR%]"
  timeoutSeconds: 3600
  ttlSecondsAfterFinished: 3600
  envFiles:
    - /root/.config/agentis/agentis.env
  env:
    HOME: /root
    BRANCH: "[%BRANCH%]"
    BASE_BRANCH: "[%BASE_BRANCH%]"
    MAIN_DIR: "[%MAIN_DIR%]"
  volumeMounts:
    - name: www
      mountPath: /var/www
    - name: agentis-tmp
      mountPath: /tmp/agentis
    - name: gitconfig
      mountPath: /root/.gitconfig
      readOnly: true
    - name: gh-config
      mountPath: /root/.config/gh
      readOnly: true
    - name: agentis-config
      mountPath: /root/.config/agentis
      readOnly: true
    - name: opencode-config
      mountPath: /root/.config/opencode
    - name: opencode-share
      mountPath: /root/.local/share/opencode
  steps:
    - name: Rebase task branch
      run: |
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        git fetch origin "$BASE_BRANCH"
        if ! git rebase "refs/remotes/origin/${BASE_BRANCH}"; then
          opencode run --model openai/gpt-5.5 "fix git conflict" \
            | tee "$AGENTIS_RUN_DIR/outputs/conflict-resolution.txt"
          if ! GIT_EDITOR=true git rebase --continue; then
            git rebase --abort
            exit 1
          fi
        fi
    - name: Fast-forward base branch
      workingDir: "[%MAIN_DIR%]"
      run: |
        if ! git rebase "$BRANCH"; then
          git stash push
          git rebase "$BRANCH"
          git stash pop
        fi
        git push origin "${BASE_BRANCH}:refs/heads/${BASE_BRANCH}"
    - name: Cleanup worktree and branch
      workingDir: "[%MAIN_DIR%]"
      run: |
        git worktree remove --force "$WORKDIR" || { rm -rf "$WORKDIR" && git worktree prune; }
        git branch -D "$BRANCH" || true
        {
          printf '✔️ Zamergoval jsem task větev do hlavní větve a uklidil prostředí.\n'
          if [ -s "$AGENTIS_RUN_DIR/outputs/conflict-resolution.txt" ]; then
            printf '\nMerge narazil na git conflict, který jsem řešil přes AI resolver.\n'
          fi
        } > "$AGENTIS_RUN_DIR/outputs/final-comment.md"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: 5
        - label: AI conflict resolver
          type: text
          valueFrom: outputs/conflict-resolution.txt
volumes:
  - name: www
    hostPath:
      path: /var/www
  - name: agentis-tmp
    hostPath:
      path: /tmp/agentis
      type: DirectoryOrCreate
  - name: gitconfig
    hostPath:
      path: /root/.gitconfig
      type: FileOrCreate
  - name: gh-config
    hostPath:
      path: /root/.config/gh
      type: DirectoryOrCreate
  - name: agentis-config
    hostPath:
      path: /root/.config/agentis/
  - name: opencode-config
    hostPath:
      path: /root/.config/opencode
      type: DirectoryOrCreate
  - name: opencode-share
    hostPath:
      path: /root/.local/share/opencode
      type: DirectoryOrCreate
