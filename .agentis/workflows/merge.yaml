version: 1
extends: _base
workflow:
  timeoutSeconds: 3600
  deleteNamespace: true
  steps:
    - name: Rebase task branch
      run: |
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        git fetch origin "$BASE_BRANCH"
        if ! git rebase "refs/remotes/origin/${BASE_BRANCH}"; then
          opencode run --model openai/gpt-5.5 "fix git conflict" \
            | tee "$AGENTIS_RUN_DIR/outputs/conflict-resolution.txt"
          if ! GIT_EDITOR=true git rebase --continue; then
            git rebase --abort
            exit 1
          fi
        fi
    - name: Fast-forward base branch
      workingDir: "[%MAIN_DIR%]"
      run: |
        if ! git rebase "$BRANCH"; then
          git stash push
          git rebase "$BRANCH"
          git stash pop
        fi
        git push origin "${BASE_BRANCH}:refs/heads/${BASE_BRANCH}"
    - name: Cleanup worktree and branch
      workingDir: "[%MAIN_DIR%]"
      run: |
        git worktree remove --force "$WORKDIR" || { rm -rf "$WORKDIR" && git worktree prune; }
        git branch -D "$BRANCH" || true
        {
          printf '✔️ Zamergoval jsem task větev do hlavní větve a uklidil prostředí.\n'
          if [ -s "$AGENTIS_RUN_DIR/outputs/conflict-resolution.txt" ]; then
            printf '\nMerge narazil na git conflict, který jsem řešil přes AI resolver.\n'
          fi
        } > "$AGENTIS_RUN_DIR/outputs/final-comment.md"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: done
    - name: Report merge failure
      always: true
      run: |
        [ "${AGENTIS_WORKFLOW_STATUS:-success}" = "failed" ] || exit 0
        mkdir -p "$AGENTIS_RUN_DIR/outputs"
        {
          printf '❌ Merge task větve selhal v kroku „%s“.\n' "$AGENTIS_FAILED_STEP"
          if [ -s "$AGENTIS_RUN_DIR/outputs/conflict-resolution.txt" ]; then
            printf '\nRebase narazil na konflikt, který se nepodařilo vyřešit ani přes AI resolver; rebase byl zrušen (git rebase --abort) a task větev zůstává beze změny.\n'
          fi
        } > "$AGENTIS_RUN_DIR/outputs/failure-comment.md"
      outputs:
        - type: agent_comment
          bodyFrom: outputs/failure-comment.md
        - label: AI conflict resolver
          type: text
          valueFrom: outputs/conflict-resolution.txt
