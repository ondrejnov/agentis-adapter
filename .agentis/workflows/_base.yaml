version: 1
# Sdílený základ pro workflow v tomto repu (`extends: _base`). Nemá `steps`,
# takže se NEdá spustit samostatně — slouží jen jako rodič pro dědičnost.
# Sémantika merge: viz docs/workflow.md, sekce „Dědičnost (`extends`)“.
workflow:
  image: rg.nl-ams.scw.cloud/reactis/opencode:1.3
  imagePullSecrets:
    - name: registry
  workingDir: "[%WORKDIR%]"
  timeoutSeconds: 14400
  ttlSecondsAfterFinished: 300
  envFiles:
    - /root/.config/agentis/agentis.env
  # Sdílené kroky: workflow se na ně odkazují přes `uses: <jméno>` a deklarují
  # jen odchylky (env merge po klíčích, ostatní pole krok přepisuje celá).
  stepTemplates:
    # Spustí agenta nad promptem runu; adapter CLI se volí podle modelu.
    # Parametry přes env:
    #   RUN_AGENT_FLAGS         — extra flagy pro agentiscode (default `--json`)
    #   RUN_AGENT_OUTPUT_DIR    — kam psát final-comment.md a session-id
    #                             (default `$AGENTIS_RUN_DIR/outputs`; přepiš spolu s `outputs`,
    #                             jejich cesty jsou relativní k output rootu runu)
    #   RUN_AGENT_STREAM_FILTER — příkaz, kterým proteče stdout agenta (default `cat`)
    run-agent:
      env:
        RUN_AGENT_FLAGS: --json
      run: |
        OUTPUT_DIR="${RUN_AGENT_OUTPUT_DIR:-$AGENTIS_RUN_DIR/outputs}"
        mkdir -p "$OUTPUT_DIR"
        MODEL="${AGENTIS_MODEL:-openai/gpt-5.4-mini}"
        case "$(printf '%s' "$MODEL" | tr '[:upper:]' '[:lower:]')" in
          *claude*) ADAPTER=claude ;;
          *) ADAPTER=opencode ;;
        esac
        agentiscode ${RUN_AGENT_FLAGS:-} --adapter "$ADAPTER" \
          ${AGENTIS_SESSION_ID:+--resume "$AGENTIS_SESSION_ID"} \
          --model "$MODEL" \
          --run-id "$AGENTIS_RUN_ID" \
          --task-id "$AGENTIS_TASK_ID" \
          --final-output "$OUTPUT_DIR/final-comment.md" \
          --session-output "$OUTPUT_DIR/session-id" \
          < "$AGENTIS_PROMPT_FILE" \
          | ${RUN_AGENT_STREAM_FILTER:-cat}
      outputs:
        - type: agent_comment
          bodyFrom: outputs/final-comment.md
          status: done
        - type: session_id
          valueFrom: outputs/session-id
  env:
    HOME: /root
    BRANCH: "[%BRANCH%]"
    BASE_BRANCH: "[%BASE_BRANCH%]"
    MAIN_DIR: "[%MAIN_DIR%]"
  volumeMounts:
    - name: www
      mountPath: /var/www
    - name: agentis-tmp
      mountPath: /tmp/agentis
    - name: gitconfig
      mountPath: /root/.gitconfig
      readOnly: true
    - name: gh-config
      mountPath: /root/.config/gh
      readOnly: true
    - name: agentis-config
      mountPath: /root/.config/agentis
      readOnly: true
    - name: opencode-config
      mountPath: /root/.config/opencode
    - name: opencode-share
      mountPath: /root/.local/share/opencode
volumes:
  - name: www
    hostPath:
      path: /var/www
  - name: agentis-tmp
    hostPath:
      path: /tmp/agentis
      type: DirectoryOrCreate
  - name: gitconfig
    hostPath:
      path: /root/.gitconfig
      type: FileOrCreate
  - name: gh-config
    hostPath:
      path: /root/.config/gh
      type: DirectoryOrCreate
  - name: agentis-config
    hostPath:
      path: /root/.config/agentis/
  - name: opencode-config
    hostPath:
      path: /root/.config/opencode
      type: DirectoryOrCreate
  - name: opencode-share
    hostPath:
      path: /root/.local/share/opencode
      type: DirectoryOrCreate
