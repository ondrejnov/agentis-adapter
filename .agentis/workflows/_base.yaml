version: 1
# Sdílený základ pro workflow v tomto repu (`extends: _base`). Nemá `steps`,
# takže se NEdá spustit samostatně — slouží jen jako rodič pro dědičnost.
# Sémantika merge: viz docs/workflow.md, sekce „Dědičnost (`extends`)“.
workflow:
  image: rg.nl-ams.scw.cloud/reactis/opencode:1.3
  imagePullSecrets:
    - name: registry
  workingDir: "[%WORKDIR%]"
  timeoutSeconds: 14400
  ttlSecondsAfterFinished: 300
  envFiles:
    - /root/.config/agentis/agentis.env
  env:
    HOME: /root
    BRANCH: "[%BRANCH%]"
    BASE_BRANCH: "[%BASE_BRANCH%]"
    MAIN_DIR: "[%MAIN_DIR%]"
  volumeMounts:
    - name: www
      mountPath: /var/www
    - name: agentis-tmp
      mountPath: /tmp/agentis
    - name: gitconfig
      mountPath: /root/.gitconfig
      readOnly: true
    - name: gh-config
      mountPath: /root/.config/gh
      readOnly: true
    - name: agentis-config
      mountPath: /root/.config/agentis
      readOnly: true
    - name: opencode-config
      mountPath: /root/.config/opencode
    - name: opencode-share
      mountPath: /root/.local/share/opencode
volumes:
  - name: www
    hostPath:
      path: /var/www
  - name: agentis-tmp
    hostPath:
      path: /tmp/agentis
      type: DirectoryOrCreate
  - name: gitconfig
    hostPath:
      path: /root/.gitconfig
      type: FileOrCreate
  - name: gh-config
    hostPath:
      path: /root/.config/gh
      type: DirectoryOrCreate
  - name: agentis-config
    hostPath:
      path: /root/.config/agentis/
  - name: opencode-config
    hostPath:
      path: /root/.config/opencode
      type: DirectoryOrCreate
  - name: opencode-share
    hostPath:
      path: /root/.local/share/opencode
      type: DirectoryOrCreate
