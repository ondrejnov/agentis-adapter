apiVersion: v1
kind: Namespace
metadata:
  name: "[%NAMESPACE%]"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: "[%NAMESPACE%]"
spec:
  replicas: 1
  strategy:
    type: Recreate # Nutné pro hostPath s jedním pod
  selector:
    matchLabels:
      app: opencode
  template:
    metadata:
      labels:
        app: opencode
    spec:
      initContainers:
        - name: setup
          image: rg.nl-ams.scw.cloud/reactis/opencode:1.2
          imagePullPolicy: IfNotPresent
          workingDir: "[%WORKDIR%]"
          command: ["/bin/bash"]
          args: ["[%WORKDIR%]/setup.sh"]
          env:
            - name: HOME
              value: /root
            - name: MAIN_DIR
              value: "[%MAIN_DIR%]"
            - name: PATH
              value: "[%WORKDIR%]/.venv/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          volumeMounts:
            - name: npm-cache
              mountPath: /root/.npm
            - name: poetry-cache
              mountPath: /root/.cache/pypoetry
            - name: www
              mountPath: /var/www
            - name: gitnexus
              mountPath: /root/.gitnexus
            - name: venv
              mountPath: "[%WORKDIR%]/.venv"
            - name: node-modules
              mountPath: "[%WORKDIR%]/frontend/node_modules"

      containers:
        - name: opencode
          image: rg.nl-ams.scw.cloud/reactis/opencode:1.2
          imagePullPolicy: IfNotPresent # Nejdřív hledá lokálně, pak stahuje z registru
          workingDir: "[%WORKDIR%]"
          env:
            - name: PYTHONPATH
              value: "[%WORKDIR%]/backend"
            - name: HOME
              value: /root
            - name: AGENTIS_URL
              value: "[%AGENTIS_URL%]"
            - name: AGENT_BROWSER_SCREENSHOT_DIR
              value: "[%WORKDIR%]/.screenshots"
            - name: IS_SANDBOX
              value: "1"
            - name: PATH
              value: "[%WORKDIR%]/.venv/bin:/root/.opencode/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          # Volume mounty - odpovídají docker -v příkazům
          volumeMounts:
            # Git config
            - name: gitconfig
              mountPath: /root/.gitconfig
              readOnly: true

            # gitnexus config
            - name: gitnexus
              mountPath: /root/.gitnexus

            # GitHub CLI config
            - name: gh-config
              mountPath: /root/.config/gh
              readOnly: true

            # OpenCode config
            - name: opencode-config
              mountPath: /root/.config/opencode

            # OpenCode data
            - name: opencode-share
              mountPath: /root/.local/share/opencode

            # Claude Code
            - name: claudecode
              mountPath: /root/.claude

            - name: codex
              mountPath: /root/.codex

            - name: www
              mountPath: /var/www/

            - name: venv
              mountPath: "[%WORKDIR%]/.venv"

            - name: node-modules
              mountPath: "[%WORKDIR%]/frontend/node_modules"

          # Bezpečnostní kontext pro hostPath přístup
          securityContext:
            allowPrivilegeEscalation: true

      # Volumes - odpovídají docker -v bindům
      volumes:
        - name: venv
          emptyDir: {}
        - name: node-modules
          emptyDir: {}

        - name: gitnexus
          hostPath:
            path: /root/.gitnexus

        # ~/.gitconfig - config pro git
        - name: gitconfig
          hostPath:
            path: /root/.gitconfig
            type: FileOrCreate

        # ~/.config/gh - GitHub CLI config
        - name: gh-config
          hostPath:
            path: /root/.config/gh
            type: DirectoryOrCreate

        # ~/.config/opencode - OpenCode config
        - name: opencode-config
          hostPath:
            path: /root/.config/opencode
            type: DirectoryOrCreate

        # ~/.local/share/opencode - OpenCode data
        - name: opencode-share
          hostPath:
            path: /root/.local/share/opencode
            type: DirectoryOrCreate
        - name: claudecode
          hostPath:
            path: /root/.claude
            type: DirectoryOrCreate
        - name: npm-cache
          hostPath:
            path: /root/.npm
            type: DirectoryOrCreate
        - name: poetry-cache
          hostPath:
            path: /root/.cache/pypoetry
            type: DirectoryOrCreate

        - name: codex
          hostPath:
            path: /root/.codex

        - name: www
          hostPath:
            path: /var/www

      # DNS policy - důležité pro přístup k síti
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: registry
---
apiVersion: v1
kind: Service
metadata:
  name: opencode
  namespace: "[%NAMESPACE%]"
spec:
  selector:
    app: opencode
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4096
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: "[%NAMESPACE%]"
spec:
  selector:
    app: opencode
  type: ClusterIP
  ports:
    - name: frontend
      protocol: TCP
      port: 5173
      targetPort: 5173
    - name: backend
      protocol: TCP
      port: 8888
      targetPort: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: "[%NAMESPACE%]"
spec:
  rules:
    - host: "app-[%NAMESPACE%].dev.agentis.cz"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 5173
    - host: "api-[%NAMESPACE%].dev.agentis.cz"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: http-ingress
  namespace: "[%NAMESPACE%]"
spec:
  rules:
    - host: "[%NAMESPACE%].dev.agentis.cz"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencode
                port:
                  number: 80
